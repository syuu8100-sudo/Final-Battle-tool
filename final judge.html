<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>コンテスト用決選投票ツール</title>
    <style>
        :root {
            --panel-w: 120px;
            --panel-h: 360px;
            --depth: 60px;
            --gold: #ffcc00;
            --gold-gradient: linear-gradient(145deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            --bg-dark: #050505;
            --panel-gap: 24px;

            --color-a: #ff3333; /* 明るい赤 */
            --color-b: #ffcc00; /* 金色/黄色 */
            --color-c: #3388ff; /* 明るい青 */

            --panel-shadow: 0 20px 50px rgba(0, 0, 0, 0.9);
            --text-emboss: 2px 2px 0px rgba(0, 0, 0, 0.5);
            --glass-bg: rgba(20, 20, 20, 0.85);
            --glass-border: rgba(191, 149, 63, 0.3);
        }

        body {
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at center, #1a150a 0%, #050505 100%);
            color: white;
            font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 設定画面 */
        #setup-screen {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid var(--glass-border);
            width: 900px;
            max-height: 90vh;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 30px;
            z-index: 100;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8), inset 0 0 40px rgba(191, 149, 63, 0.05);
        }

        #setup-screen h2 {
            margin: 0;
            text-align: center;
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 2.5rem;
            letter-spacing: 6px;
            font-weight: 900;
            text-transform: uppercase;
        }

        .setup-flex {
            display: flex;
            gap: 40px;
        }

        .setup-column {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-group label {
            font-size: 0.9rem;
            color: var(--gold);
            font-weight: bold;
            text-shadow: 1px 1px 2px black;
        }

        input,
        select {
            background: #0a0a0a;
            border: 1px solid #bf953f;
            color: white;
            padding: 12px;
            border-radius: 5px;
            outline: none;
            font-size: 1rem;
        }

        input:focus,
        select:focus {
            box-shadow: 0 0 10px rgba(191, 149, 63, 0.5);
        }

        .judge-edit-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            align-items: center;
            background: rgba(255, 255, 255, 0.03);
            padding: 10px;
            border-radius: 6px;
            border-left: 3px solid #bf953f;
        }

        #start-btn {
            background: var(--gold-gradient);
            color: #000;
            border: none;
            padding: 22px;
            font-size: 1.6rem;
            font-weight: 900;
            cursor: pointer;
            margin-top: 15px;
            border-radius: 60px;
            transition: all 0.3s;
            text-transform: uppercase;
            box-shadow: 0 10px 30px rgba(191, 149, 63, 0.4);
        }

        #start-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 40px rgba(191, 149, 63, 0.6);
        }

        /* 発表画面 */
        #presentation-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .judges-row {
            display: flex;
            gap: var(--panel-gap);
            perspective: 3000px;
            flex-wrap: nowrap;
            justify-content: center;
            padding: 60px 20px;
            width: 100%;
            max-width: 100%;
            margin: 0 auto;
            box-sizing: border-box;
            overflow: visible;
        }

        #presentation-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            width: 100%;
            overflow: hidden; /* スクロールを禁止し、収める */
            padding-bottom: 40px;
        }

        /* 横向き促しオーバーレイ */
        #orientation-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            color: var(--gold);
            z-index: 100000;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }

        @media (max-width: 900px) and (orientation: portrait) {
            #orientation-overlay {
                display: flex;
            }
        }

        .rotate-icon {
            font-size: 4rem;
            margin-bottom: 20px;
            animation: rotateDevice 2s infinite;
        }

        @keyframes rotateDevice {
            0% { transform: rotate(0deg); }
            50% { transform: rotate(-90deg); }
            100% { transform: rotate(0deg); }
        }

        .scene {
            width: var(--panel-w);
            height: var(--panel-h);
            margin-bottom: 80px;
            /* 台座のスペースを確保 */
            position: relative;
        }

        /* 接地感のための影 */
        .scene::after {
            content: "";
            position: absolute;
            bottom: -40px;
            left: 50%;
            transform: translateX(-50%) rotateX(90deg);
            width: calc(var(--panel-w) * 2);
            height: calc(var(--depth) * 4);
            background: radial-gradient(ellipse at center, rgba(0, 0, 0, 0.5) 0%, transparent 70%);
            z-index: -1;
            pointer-events: none;
        }



        .panel {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 1.0s cubic-bezier(0.2, 0, 0, 1);
            transform: rotateY(0deg);
        }

        .panel-face {
            position: absolute;
            width: var(--panel-w);
            height: var(--panel-h);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 26px;
            backface-visibility: hidden;
            box-sizing: border-box;
            writing-mode: vertical-rl;
            text-orientation: upright;
            letter-spacing: 12px;
            overflow: hidden;
            white-space: nowrap;
            box-shadow: inset 0 0 15px rgba(191, 149, 63, 0.3);
            border-radius: 12px;
            /* パネルに丸みを持たせる */
        }

        .panel-face::before {
            content: "";
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent 45%, rgba(255, 255, 255, 0.1) 50%, transparent 55%);
            pointer-events: none;
        }

        /* 4面設定 */
        .face-judge {
            background: linear-gradient(135deg, #444 0%, #111 100%);
            transform: rotateY(0deg) translateZ(var(--depth));
            color: #ccc;
            box-shadow: inset 0 0 50px rgba(0, 0, 0, 0.8);
        }

        .face-a {
            background: radial-gradient(circle at 50% 30%, #ff4d4d 0%, var(--color-a) 50%, #800 100%);
            transform: rotateY(90deg) translateZ(var(--depth));
            color: white;
            text-shadow: var(--text-emboss), 0 0 15px rgba(255, 255, 255, 0.6);
            box-shadow: inset 0 0 40px rgba(255, 0, 0, 0.6), 0 0 25px rgba(230, 0, 0, 0.7);
        }

        .face-b {
            background: radial-gradient(circle at 50% 30%, #ffff80 0%, var(--color-b) 50%, #b80 100%);
            transform: rotateY(180deg) translateZ(var(--depth));
            color: black;
            text-shadow: 1px 1px 0 rgba(255, 255, 255, 0.8), 0 0 15px rgba(255, 255, 255, 0.8);
            box-shadow: inset 0 0 40px rgba(255, 204, 0, 0.6), 0 0 25px rgba(255, 204, 0, 0.7);
        }

        .face-c {
            background: radial-gradient(circle at 50% 30%, #4d88ff 0%, var(--color-c) 50%, #0022aa 100%);
            transform: rotateY(270deg) translateZ(var(--depth));
            color: white;
            text-shadow: var(--text-emboss), 0 0 15px rgba(255, 255, 255, 0.6);
            box-shadow: inset 0 0 40px rgba(0, 100, 255, 0.6), 0 0 25px rgba(0, 68, 255, 0.7);
        }

        /* 投票画面 */
        #voting-screen {
            display: none;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            padding: 60px 40px;
            border-radius: 24px;
            border: 1px solid var(--glass-border);
            width: 600px;
            flex-direction: column;
            align-items: center;
            gap: 40px;
            z-index: 150;
            box-shadow: 0 50px 150px rgba(0, 0, 0, 0.9);
            text-align: center;
        }

        .vote-options {
            display: flex;
            gap: 20px;
            width: 100%;
        }

        .vote-btn {
            flex: 1;
            padding: 30px 10px;
            font-size: 1.4rem;
            font-weight: 900;
            cursor: pointer;
            border-radius: 10px;
            transition: all 0.3s;
            border: 2px solid transparent;
            text-shadow: var(--text-emboss);
        }

        .btn-a {
            background: var(--color-a);
            color: white;
        }

        .btn-b {
            background: var(--color-b);
            color: #000;
            text-shadow: none;
        }

        .btn-c {
            background: var(--color-c);
            color: white;
        }

        .vote-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.2);
            border-color: white;
        }

        /* 優勝結果オーバーレイ */
        .result-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(0, 0, 0, 0.85) 0%, rgba(0, 0, 0, 1) 100%);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 200;
            animation: fadeIn 2s forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        .winner-announcement {
            font-size: 6rem;
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
            text-shadow: 0 0 60px rgba(255, 204, 0, 0.5);
            letter-spacing: 25px;
            margin-bottom: 20px;
        }

        .winner-name {
            font-size: 4rem;
            color: white;
            font-weight: 900;
            margin-bottom: 50px;
            letter-spacing: 5px;
        }

        .reset-link {
            padding: 15px 45px;
            background: transparent;
            color: var(--gold);
            border: 2px solid var(--gold);
            cursor: pointer;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: bold;
            transition: all 0.3s;
        }

        .reset-link:hover {
            background: var(--gold);
            color: black;
        }

        .count-btn {
            background: #111;
            border: 1px solid #bf953f;
            color: #bf953f;
            padding: 8px 15px;
            cursor: pointer;
            border-radius: 4px;
            flex: 1;
            font-weight: bold;
            transition: all 0.2s;
        }

        .count-btn.active {
            background: var(--gold-gradient);
            color: black;
            border-color: transparent;
        }

        /* 暗転画面 */
        #darkness-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 300;
            cursor: pointer;
        }

        .darkness-text {
            color: #444;
            font-size: 1.2rem;
            letter-spacing: 5px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.3; }
            50% { opacity: 0.7; }
            100% { opacity: 0.3; }
        }
        
        /* 多人数時の調整を無効化（スクロールで対応するため） */
        /* .judges-8 以降の個別サイズ調整を削除 */

        .crown-3d {
            position: absolute;
            top: -40px;
            /* パネルに密着させる */
            left: 0;
            width: var(--panel-w);
            height: 40px;
            transform-style: preserve-3d;
            z-index: 15;
        }

        .crown-side {
            position: absolute;
            height: 42px;
            /* 少し高さを出して隙間を埋める */
            background: var(--gold-gradient);
            clip-path: polygon(0% 100%, 5% 30%, 20% 70%, 50% 0%, 80% 70%, 95% 30%, 100% 100%);
            box-sizing: border-box;
            border-radius: 4px;
            /* 王冠の端にわずかな丸み */
        }

        .c-front {
            width: var(--panel-w);
            transform: rotateY(0deg) translateZ(var(--depth));
        }

        .c-back {
            width: var(--panel-w);
            transform: rotateY(180deg) translateZ(var(--depth));
            filter: brightness(0.8);
        }

        .c-left {
            width: calc(var(--depth) * 2);
            left: 50%;
            transform: translateX(-50%) rotateY(-90deg) translateZ(calc(var(--panel-w) / 2));
            filter: brightness(0.9);
        }

        .c-right {
            width: calc(var(--depth) * 2);
            left: 50%;
            transform: translateX(-50%) rotateY(90deg) translateZ(calc(var(--panel-w) / 2));
            filter: brightness(0.9);
        }

        /* 王冠の蓋（中身がスカスカに見えないようにする） */
        .c-top,
        .c-bottom {
            position: absolute;
            width: var(--panel-w);
            height: calc(var(--depth) * 2);
            left: 0;
            background: #d4af37;
            backface-visibility: hidden;
        }

        .c-top {
            top: 50%;
            transform: translateY(-50%) rotateX(90deg) translateZ(-12px);
            /* 谷間の高さに配置 */
            background: linear-gradient(to bottom, #fcf6ba, #bf953f);
        }

        .c-bottom {
            top: 50%;
            transform: translateY(-50%) rotateX(90deg) translateZ(20px);
            /* 底面 */
            background: #886600;
        }

        /* 王冠の芯（中身を完全に埋める） */
        .crown-core {
            position: absolute;
            top: 10px;
            /* 谷間より下 */
            left: 5px;
            width: calc(var(--panel-w) - 10px);
            height: 30px;
            background: #bf953f;
            transform-style: preserve-3d;
        }

        .core-face {
            position: absolute;
            width: 100%;
            height: 100%;
            background: #b38728;
            backface-visibility: hidden;
        }

        .cr-f {
            transform: rotateY(0deg) translateZ(calc(var(--depth) - 5px));
        }

        .cr-b {
            transform: rotateY(180deg) translateZ(calc(var(--depth) - 5px));
        }

        .cr-l {
            width: calc(var(--depth) * 2 - 10px);
            left: 50%;
            transform: translateX(-50%) rotateY(-90deg) translateZ(calc(var(--panel-w)/2 - 5px));
        }

        .cr-r {
            width: calc(var(--depth) * 2 - 10px);
            left: 50%;
            transform: translateX(-50%) rotateY(90deg) translateZ(calc(var(--panel-w)/2 - 5px));
        }

        /* 台座のスタイル（縁取りなし） */
        .pedestal-3d {
            position: absolute;
            top: var(--panel-h);
            left: 0;
            width: var(--panel-w);
            height: 30px;
            transform-style: preserve-3d;
        }

        .pedestal-face {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #ffffff 0%, #e0e0e0 100%);
            box-sizing: border-box;
            backface-visibility: hidden;
            box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
            /* 台座に丸みを持たせる */
        }

        .p-top {
            height: calc(var(--depth) * 2);
            top: 50%;
            transform: translateY(-50%) rotateX(90deg) translateZ(15px);
            background: #fff;
        }

        .p-front {
            transform: rotateY(0deg) translateZ(var(--depth));
        }

        .p-back {
            transform: rotateY(180deg) translateZ(var(--depth));
        }

        .p-left {
            width: calc(var(--depth) * 2);
            left: 50%;
            transform: translateX(-50%) rotateY(-90deg) translateZ(calc(var(--panel-w) / 2));
        }

        .p-right {
            width: calc(var(--depth) * 2);
            left: 50%;
            transform: translateX(-50%) rotateY(90deg) translateZ(calc(var(--panel-w) / 2));
        }



        .scene {
            position: relative;
        }

        /* 全画面ボタン */
        #fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 10000;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        #fullscreen-btn:hover {
            background: rgba(191, 149, 63, 0.6);
            transform: scale(1.1) rotate(90deg);
            border-color: var(--gold);
        }

        #fullscreen-btn svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }

        /* タブレット対応 (768px〜1024px) */
        @media (max-width: 1024px) and (min-width: 769px) {
            :root {
                --panel-w: 100px;
                --panel-h: 300px;
                --depth: 50px;
                --panel-gap: 16px;
            }
            #setup-screen {
                width: 90vw;
                padding: 30px;
            }
            .judges-row {
                perspective: 2000px;
            }
        }

        /* スマホ対応 (768px以下) */
        @media (max-width: 768px) {
            :root {
                --panel-w: 80px;
                --panel-h: 240px;
                --depth: 40px;
                --panel-gap: 10px;
            }
            body {
                padding: 10px;
                align-items: center; /* 中央揃えに戻す */
            }
            #setup-screen {
                width: 100%;
                padding: 20px;
                gap: 20px;
                border-radius: 16px;
            }
            #setup-screen h2 {
                font-size: 1.5rem;
            }
            .setup-flex {
                flex-direction: column;
            }
            #voting-screen {
                width: 95%;
                padding: 40px 20px;
            }
            .vote-btn {
                padding: 20px;
                font-size: 1.1rem;
            }
            .judges-row {
                perspective: 1500px;
                padding: 40px 10px;
                gap: 8px;
                flex-wrap: nowrap;
                justify-content: center;
            }
            .scene {
                margin-bottom: 60px; /* 台座のスペース */
            }
            .panel-face {
                font-size: 18px !important;
                letter-spacing: 4px !important;
            }
            .winner-announcement {
                font-size: 3.5rem !important;
                letter-spacing: 12px !important;
            }
            .winner-name {
                font-size: 2.5rem !important;
            }
            #fullscreen-btn {
                top: 10px;
                right: 10px;
                width: 44px;
                height: 44px;
            }
        }
    </style>
</head>

<body>

    <!-- 横向き促し -->
    <div id="orientation-overlay">
        <div class="rotate-icon">📱</div>
        <div style="font-size: 1.5rem; font-weight: bold; margin-bottom: 10px;">画面を横向きにしてください</div>
        <p>審査パネルを最適に表示するため、<br>端末を横回転させてご覧ください。</p>
    </div>

    <!-- 全画面ボタン -->
    <button id="fullscreen-btn" onclick="toggleFullscreen()" title="全画面">
        <svg viewBox="0 0 24 24" id="fullscreen-icon">
            <path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/>
        </svg>
    </button>

    <div id="setup-screen">
        <h2>Tournament Final Setup</h2>

        <div class="setup-flex">
            <div class="setup-column">
                <div class="input-group">
                    <label style="color: var(--color-a)">FINALIST A (RED)</label>
                    <input type="text" id="name-a" value="ファイナリストA">
                </div>
                <div class="input-group">
                    <label style="color: var(--color-b)">FINALIST B (YELLOW)</label>
                    <input type="text" id="name-b" value="ファイナリストB">
                </div>
                <div class="input-group">
                    <label style="color: var(--color-c)">FINALIST C (BLUE)</label>
                    <input type="text" id="name-c" value="ファイナリストC">
                </div>

                <div class="input-group" style="margin-top: 15px;">
                    <label style="color: var(--gold)">審査員の人数 (1-10人)</label>
                    <div style="display: flex; align-items: center; gap: 15px;">
                        <input type="range" id="judge-range" min="1" max="10" value="5" oninput="setJudgeCount(this.value)" style="flex: 1;">
                        <span id="judge-count-display" style="font-size: 1.5rem; font-weight: 900; color: var(--gold); min-width: 40px;">5人</span>
                    </div>
                    <input type="hidden" id="judge-count-input" value="5">
                </div>

                <div
                    style="margin-top: 25px; padding: 20px; border: 1px solid #bf953f; background: rgba(0,0,0,0.5); font-size: 0.9rem; color: #aaa; line-height: 1.6;">
                    <strong style="color: var(--gold)">操作ガイド:</strong><br>
                    1. 漫才師の名前と審査員の人数を決めます。<br>
                    2. 各審査員が誰に投票したかを設定します。<br>
                    3. ボタンを押すと緊張感あふれる開票が始まります。
                </div>
            </div>

            <div class="setup-column" id="judges-setup-list">
                <label
                    style="color: var(--gold); font-size: 1rem; border-bottom: 1px solid #bf953f; padding-bottom: 5px;">審査員詳細設定</label>
            </div>
        </div>

        <button id="start-btn">投票入力へ進む</button>
    </div>

    <div id="voting-screen">
        <h2 style="color: var(--gold); letter-spacing: 4px;">VOTING PHASE</h2>
        <div style="font-size: 2.5rem; margin: 20px 0; font-weight: 900;" id="voting-judge-name"></div>
        <p style="color: #aaa; margin-bottom: 30px;">他の人に見られないように投票ボタンを押してください</p>

        <div class="vote-options">
            <button class="vote-btn btn-a" onclick="castVote(0)" id="vote-target-a"></button>
            <button class="vote-btn btn-b" onclick="castVote(1)" id="vote-target-b"></button>
            <button class="vote-btn btn-c" onclick="castVote(2)" id="vote-target-c"></button>
        </div>

        <div id="voting-progress" style="margin-top: 40px; color: var(--gold); font-weight: bold; font-size: 1.2rem;">
        </div>
    </div>

    <div id="presentation-screen">
        <div class="judges-row" id="panelContainer"></div>
    </div>

    <div id="darkness-screen">
        <div class="darkness-text">CLICK OR PRESS KEY TO START</div>
    </div>

    <div id="result-overlay" class="result-overlay">
        <div class="winner-announcement">CHAMPION</div>
        <div class="winner-name" id="winner-text"></div>
        <div class="reset-link" onclick="location.reload()">もう一度シミュレーションする</div>
    </div>

    <script>
        // 全画面トグル
        function toggleFullscreen() {
            const btn = document.getElementById('fullscreen-btn');
            const icon = document.getElementById('fullscreen-icon');
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().then(() => {
                    icon.innerHTML = '<path d="M5 16h3v3h2v-5H5v2zm3-8H5v2h5V5H8v3zm6 11h2v-3h3v-2h-5v5zm2-11V5h-2v5h5V8h-3z"/>';
                    btn.title = '全画面解除';
                }).catch(err => {
                    console.error(`Error attempting to enable full-screen mode: ${err.message}`);
                });
            } else {
                document.exitFullscreen().then(() => {
                    icon.innerHTML = '<path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/>';
                    btn.title = '全画面';
                });
            }
        }
        document.addEventListener('fullscreenchange', () => {
            const icon = document.getElementById('fullscreen-icon');
            if (!document.fullscreenElement) {
                icon.innerHTML = '<path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/>';
            }
        });

        const setupScreen = document.getElementById('setup-screen');
        const presentationScreen = document.getElementById('presentation-screen');
        const panelContainer = document.getElementById('panelContainer');
        const startBtn = document.getElementById('start-btn');
        const resultOverlay = document.getElementById('result-overlay');
        const winnerText = document.getElementById('winner-text');
        const judgesSetupList = document.getElementById('judges-setup-list');
        const judgeCountInput = document.getElementById('judge-count-input');

        const defaultNames = ["審査員1", "審査員2", "審査員3", "審査員4", "審査員5", "審査員6", "審査員7", "審査員8", "審査員9", "審査員10", "審査員11", "審査員12", "審査員13", "審査員14", "審査員15"];

        function updateJudgeInputs() {
            const count = parseInt(judgeCountInput.value) || 1;
            const currentNames = Array.from(document.querySelectorAll('.judge-name-input')).map(input => input.value);

            judgesSetupList.innerHTML = '<label style="color: var(--gold); font-size: 1rem; border-bottom: 1px solid #bf953f; padding-bottom: 5px;">審査員詳細設定</label>';

            for (let i = 0; i < count; i++) {
                const row = document.createElement('div');
                row.className = 'judge-edit-row';
                const nameValue = currentNames[i] || defaultNames[i] || `審査員${i + 1}`;

                row.innerHTML = `
                    <input type="text" class="judge-name-input" value="${nameValue}" placeholder="審査員名" style="grid-column: span 2;">
                `;
                judgesSetupList.appendChild(row);
            }
        }

        function setJudgeCount(count) {
            judgeCountInput.value = count;
            document.getElementById('judge-count-display').textContent = count + "人";
            document.getElementById('judge-range').value = count;
            updateJudgeInputs();
        }

        let names = [];
        let finalVotes = [];
        let finalJudgeNames = [];
        let counts = [0, 0, 0];

        let currentVotingIndex = 0;

        startBtn.addEventListener('click', () => {
            const count = parseInt(judgeCountInput.value) || 1;
            names = [
                document.getElementById('name-a').value || "A",
                document.getElementById('name-b').value || "B",
                document.getElementById('name-c').value || "C"
            ];

            const nameInputs = document.querySelectorAll('.judge-name-input');
            finalJudgeNames = [];
            for (let i = 0; i < count; i++) {
                finalJudgeNames.push(nameInputs[i].value || `審査員${i + 1}`);
            }

            setupScreen.style.display = 'none';
            document.getElementById('voting-screen').style.display = 'flex';

            currentVotingIndex = 0;
            finalVotes = [];
            updateVotingUI();
        });

        function updateVotingUI() {
            const judgeName = finalJudgeNames[currentVotingIndex];
            document.getElementById('voting-judge-name').textContent = judgeName;

            // 決選投票などで選択肢が減っている場合を考慮
            const btnA = document.getElementById('vote-target-a');
            const btnB = document.getElementById('vote-target-b');
            const btnC = document.getElementById('vote-target-c');

            btnA.textContent = names[0] || "-";
            btnB.textContent = names[1] || "-";
            btnC.textContent = names[2] || "-";

            btnA.style.display = names[0] ? 'block' : 'none';
            btnB.style.display = names[1] ? 'block' : 'none';
            btnC.style.display = names[2] ? 'block' : 'none';

            document.getElementById('voting-progress').textContent = `審査員: ${currentVotingIndex + 1} / ${finalJudgeNames.length}`;
        }

        function castVote(idx) {
            finalVotes.push(idx);
            currentVotingIndex++;

            if (currentVotingIndex < finalJudgeNames.length) {
                updateVotingUI();
            } else {
                document.getElementById('voting-screen').style.display = 'none';
                showDarkness();
            }
        }

        function showDarkness() {
            const darkness = document.getElementById('darkness-screen');
            darkness.style.display = 'flex';

            // 一度だけクリックまたはキー入力待ち
            const startReveal = () => {
                darkness.style.display = 'none';
                window.removeEventListener('keydown', startReveal);
                window.removeEventListener('click', startReveal);
                startPresentation();
            };

            window.addEventListener('keydown', startReveal);
            window.addEventListener('click', startReveal);
        }

        function waitForNext() {
            return new Promise(resolve => {
                const onNext = (e) => {
                    // スペースキーまたはクリック/タップ
                    if (e.type === 'click' || e.code === 'Space' || e.code === 'Enter') {
                        window.removeEventListener('keydown', onNext);
                        window.removeEventListener('click', onNext);
                        resolve();
                    }
                };
                window.addEventListener('keydown', onNext);
                window.addEventListener('click', onNext);
            });
        }

        function startPresentation() {
            const count = finalJudgeNames.length;
            counts = [0, 0, 0]; // 票数をリセット

            // パネル生成
            panelContainer.innerHTML = '';
            for (let i = 0; i < count; i++) {
                const scene = document.createElement('div');
                scene.className = 'scene';
                scene.innerHTML = `
                    <div class="panel" id="panel-${i}">
                        <div class="crown-3d">
                            <div class="crown-side c-front"></div>
                            <div class="crown-side c-back"></div>
                            <div class="crown-side c-left"></div>
                            <div class="crown-side c-right"></div>
                            <div class="c-top"></div>
                            <div class="c-bottom"></div>
                            <!-- 内部の芯 -->
                            <div class="crown-core">
                                <div class="core-face cr-f"></div>
                                <div class="core-face cr-b"></div>
                                <div class="core-face cr-l"></div>
                                <div class="core-face cr-r"></div>
                            </div>
                        </div>
                        <div class="panel-face face-judge">${finalJudgeNames[i]}</div>
                        <div class="panel-face face-a">${names[0]}</div>
                        <div class="panel-face face-b">${names[1]}</div>
                        <div class="panel-face face-c">${names[2]}</div>
                        
                        <!-- 3D台座（縁取りなし） -->
                        <div class="pedestal-3d">
                            <div class="pedestal-face p-top"></div>
                            <div class="pedestal-face p-front"></div>
                            <div class="pedestal-face p-back"></div>
                            <div class="pedestal-face p-left"></div>
                            <div class="pedestal-face p-right"></div>
                        </div>
                    </div>
                `;
                panelContainer.appendChild(scene);
            }

            presentationScreen.style.display = 'flex';
            
            // 画面幅に合わせてパネルサイズを調整
            adjustPanelSizes(count);
            window.addEventListener('resize', () => adjustPanelSizes(count));

            startAutomaticReveal(count);
        }

        function adjustPanelSizes(count) {
            const containerWidth = window.innerWidth * 0.95; // 画面幅の95%を使用
            const gap = window.innerWidth < 768 ? 8 : 16;
            const totalGap = gap * (count - 1);
            
            // 最大幅を120pxとし、入り切らない場合は細くする
            let panelW = Math.floor((containerWidth - totalGap) / count);
            panelW = Math.min(120, Math.max(40, panelW)); // 40px〜120pxの範囲
            
            const depth = Math.floor(panelW * 0.5); // 幅に合わせて奥行きも調整
            const panelH = Math.floor(panelW * 3);  // 縦横比を維持
            
            panelContainer.style.setProperty('--panel-w', `${panelW}px`);
            panelContainer.style.setProperty('--depth', `${depth}px`);
            panelContainer.style.setProperty('--panel-h', `${panelH}px`);
            panelContainer.style.setProperty('--panel-gap', `${gap}px`);
            
            // 文字サイズも調整
            const fontSize = Math.max(12, Math.floor(panelW * 0.22));
            const letterSpacing = Math.max(2, Math.floor(panelW * 0.1));
            
            document.querySelectorAll('.panel-face').forEach(face => {
                face.style.fontSize = `${fontSize}px`;
                face.style.letterSpacing = `${letterSpacing}px`;
            });
            
            // 王冠と台座のサイズ調整
            document.querySelectorAll('.crown-3d').forEach(crown => {
                crown.style.top = `-${Math.floor(panelW * 0.35)}px`;
                crown.style.height = `${Math.floor(panelW * 0.35)}px`;
            });
            document.querySelectorAll('.crown-side').forEach(side => {
                side.style.height = `${Math.floor(panelW * 0.38)}px`;
            });
            document.querySelectorAll('.pedestal-3d').forEach(ped => {
                ped.style.height = `${Math.floor(panelW * 0.25)}px`;
                ped.style.top = `${panelH}px`;
            });
        }

        async function startAutomaticReveal(count) {
            // 開始前の静寂
            await sleep(800);

            // パネルコンテナのクラス設定
            panelContainer.className = 'judges-row';
            // 自動縮小ロジックを削除（一列スクロール維持のため）

            for (let i = 0; i < count; i++) {
                const voteIdx = finalVotes[i];
                const panel = document.getElementById(`panel-${i}`);

                // 終盤（最後の2人）で、現時点で1位が複数いる（同点）の場合は「溜め」をさらに長く作る
                if (i >= count - 2) {
                    const currentMax = Math.max(...counts);
                    const tieCount = counts.filter(c => c === currentMax && currentMax > 0).length;
                    if (tieCount >= 2) {
                        await sleep(2200); // 2秒以上の緊張感ある「間」
                    }
                }

                // 360度（一回転）したあと、目的の面（A:270度、B:180度、C:90度）でピタッと止まるように計算
                // ※face-aが90度、face-bが180度、face-cが270度に配置されているため、反転させて計算
                const faceAngles = [270, 180, 90];
                const rotation = 360 + faceAngles[voteIdx];

                panel.style.transition = "transform 0.8s cubic-bezier(0.2, 0, 0, 1)";
                panel.style.transform = `rotateY(${rotation}deg)`;

                counts[voteIdx]++;

                // 回転が終わるのを待ってから次に進む
                const waitTime = (i === count - 1) ? 2500 : 1400;
                await sleep(waitTime);
            }

            // 勝者の判定
            const max = Math.max(...counts);
            const winnersIdx = [];
            counts.forEach((c, idx) => { if (c === max) winnersIdx.push(idx); });

            if (winnersIdx.length > 1) {
                // 同点時の処理
                await sleep(1000);
                alert("同点です！決選投票を行います。");

                // 負けた人を names から除外（nullにする）
                const newNames = names.map((name, idx) => winnersIdx.includes(idx) ? name : null);
                names = newNames;

                presentationScreen.style.display = 'none';
                document.getElementById('voting-screen').style.display = 'flex';
                currentVotingIndex = 0;
                finalVotes = [];
                updateVotingUI();
                return;
            }

            resultOverlay.style.display = 'flex';
            winnerText.textContent = names[winnersIdx[0]];
        }

        function sleep(ms) { return new Promise(resolve => setTimeout(resolve, ms)); }

        // 初期化
        updateJudgeInputs();
    </script>
</body>

</html>
